<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과학시간 모둠 편성기</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 React 문법을 해석해주는 도구) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS (디자인 도구) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 아이콘 컴포넌트들 (SVG)
    const UsersIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    );
    const SettingsIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    );
    const ShuffleIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    );
    const CopyIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    );
    const CheckCircleIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );
    const RefreshIcon = () => (
      <svg className="opacity-20" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );

    function App() {
      const initialStudents = Array.from({ length: 31 }, (_, i) => `${i + 1}번 학생`);
      
      const [inputText, setInputText] = useState(initialStudents.join('\n'));
      const [groups, setGroups] = useState([]);
      const [numGroups, setNumGroups] = useState(6);
      const [assignRoles, setAssignRoles] = useState(true);
      const [isCopied, setIsCopied] = useState(false);
      const [isShuffling, setIsShuffling] = useState(false);

      const roles = [
        '👨‍🔬 수석연구원', 
        '📝 실험기록원', 
        '🥽 안전및물질관리자', 
        '🗣️ 발표자', 
        '⏱️ 운영보조원'
      ];

      const shuffleArray = (array) => {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      };

      const generateGroups = () => {
        setIsShuffling(true);
        setTimeout(() => {
          const studentsList = inputText.split(/[,\n]+/).map(s => s.trim()).filter(s => s.length > 0);

          if (studentsList.length === 0) {
            alert("학생 명단을 입력해주세요.");
            setIsShuffling(false);
            return;
          }

          const shuffled = shuffleArray(studentsList);
          const newGroups = Array.from({ length: numGroups }, () => []);

          shuffled.forEach((student, index) => {
            newGroups[index % numGroups].push(student);
          });

          setGroups(newGroups);
          setIsCopied(false);
          setIsShuffling(false);
        }, 400);
      };

      const copyToClipboard = () => {
        if (groups.length === 0) return;

        let textToCopy = "🧪 과학 시간 모둠 편성 결과\n\n";
        groups.forEach((group, i) => {
          textToCopy += `[ ${i + 1}조 ]\n`;
          group.forEach((student, j) => {
            const role = assignRoles ? ` - ${roles[j % roles.length]}` : '';
            textToCopy += `${student}${role}\n`;
          });
          textToCopy += '\n';
        });

        // iFrame 및 브라우저 호환성을 위한 클립보드 복사 로직
        const textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setIsCopied(true);
          setTimeout(() => setIsCopied(false), 2000);
        } catch (err) {
          console.error('복사 실패', err);
          alert('복사에 실패했습니다.');
        }
        document.body.removeChild(textArea);
      };

      const studentCount = inputText.split(/[,\n]+/).filter(s => s.trim().length > 0).length;

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white rounded-2xl shadow-sm p-6 flex items-center gap-4 border border-slate-100">
              <div className="bg-teal-100 p-3 rounded-xl text-teal-600">
                <UsersIcon />
              </div>
              <div>
                <h1 className="text-2xl font-bold text-slate-800">과학 모둠 편성기</h1>
                <p className="text-slate-500 text-sm mt-1">학생 명단을 입력하고 무작위로 과학 실험 조를 편성해보세요.</p>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-6 lg:col-span-1 h-fit">
                <div>
                  <div className="flex justify-between items-center mb-2">
                    <label className="font-semibold text-slate-700 flex items-center gap-2">학생 명단</label>
                    <span className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-full font-medium">총 {studentCount}명</span>
                  </div>
                  <p className="text-xs text-slate-500 mb-3">이름을 줄바꿈(엔터)이나 쉼표로 구분해서 입력해주세요.</p>
                  <textarea
                    className="w-full h-64 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none resize-none text-sm leading-relaxed bg-slate-50"
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    placeholder="홍길동&#13;&#10;김철수&#13;&#10;이영희"
                  ></textarea>
                </div>

                <div className="space-y-4 pt-4 border-t border-slate-100">
                  <div className="flex items-center justify-between">
                    <label className="text-sm font-medium text-slate-700 flex items-center gap-2">
                      <SettingsIcon /> 모둠 수
                    </label>
                    <select 
                      className="border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-teal-500 outline-none"
                      value={numGroups}
                      onChange={(e) => setNumGroups(Number(e.target.value))}
                    >
                      {[4, 5, 6, 7, 8].map(n => (
                        <option key={n} value={n}>{n}개 조</option>
                      ))}
                    </select>
                  </div>

                  <label className="flex items-center gap-3 cursor-pointer group">
                    <div className="relative">
                      <input 
                        type="checkbox" 
                        className="sr-only" 
                        checked={assignRoles}
                        onChange={(e) => setAssignRoles(e.target.checked)}
                      />
                      <div className={`block w-10 h-6 rounded-full transition-colors ${assignRoles ? 'bg-teal-500' : 'bg-slate-300'}`}></div>
                      <div className={`absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${assignRoles ? 'transform translate-x-4' : ''}`}></div>
                    </div>
                    <div className="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">
                      과학 역할 자동 부여
                      <p className="text-xs text-slate-400 font-normal mt-0.5">수석연구원, 기록원 등 5가지 역할을 나눕니다.</p>
                    </div>
                  </label>
                </div>

                <button
                  onClick={generateGroups}
                  disabled={isShuffling}
                  className={`w-full py-3 px-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-semibold shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 ${isShuffling ? 'opacity-75 cursor-not-allowed' : ''}`}
                >
                  <ShuffleIcon className={isShuffling ? "animate-spin" : ""} />
                  {isShuffling ? '편성 중...' : '모둠 편성하기'}
                </button>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 lg:col-span-2 min-h-[500px] flex flex-col">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-lg font-bold text-slate-800">편성 결과</h2>
                  {groups.length > 0 && (
                    <button
                      onClick={copyToClipboard}
                      className="flex items-center gap-2 text-sm px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600 font-medium"
                    >
                      {isCopied ? <CheckCircleIcon /> : <CopyIcon />}
                      {isCopied ? <span className="text-green-600">복사 완료!</span> : '결과 복사'}
                    </button>
                  )}
                </div>

                {groups.length === 0 ? (
                  <div className="flex-1 flex flex-col items-center justify-center text-slate-400 space-y-4">
                    <RefreshIcon />
                    <p>왼쪽에서 명단을 확인하고 편성 버튼을 눌러주세요.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    {groups.map((group, groupIndex) => (
                      <div key={groupIndex} className="bg-slate-50 rounded-xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                        <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                          <span className="font-bold">{groupIndex + 1}조</span>
                          <span className="text-xs bg-slate-700 px-2 py-1 rounded-full">{group.length}명</span>
                        </div>
                        <ul className="divide-y divide-slate-100 p-2">
                          {group.map((student, studentIndex) => (
                            <li key={studentIndex} className="px-3 py-2.5 flex flex-col gap-1.5 hover:bg-white rounded-lg transition-colors">
                              <span className="font-medium text-slate-700">{student}</span>
                              {assignRoles && (
                                <span className="text-xs font-medium text-teal-700 bg-teal-50 border border-teal-100 px-2 py-0.5 rounded-md w-fit">
                                  {roles[studentIndex % roles.length]}
                                </span>
                              )}
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
